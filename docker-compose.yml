version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: commerce_postgres
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-commerce}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - commerce-network

volumes:
  postgres_data:

networks:
  commerce-network:
